{% extends "base.html" %}

{% block content %}
<!-- Step 1: Scan directory -->
<div class="mb-6">
    <div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1a1d26] p-4 shadow-sm">
        <form class="flex items-center gap-3"
              hx-post="/partials/repo-list"
              hx-target="#repo-list"
              hx-indicator="#scan-spinner">
            <div class="flex-1 relative">
                <input type="text" name="root_dir" id="root_dir"
                       value="{{ default_root_dir }}"
                       placeholder="/path/to/repos/"
                       class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700
                              bg-gray-50 dark:bg-[#0f1117] text-gray-900 dark:text-gray-100
                              placeholder-gray-400 dark:placeholder-gray-500
                              focus:outline-none focus:ring-2 focus:ring-indigo-500/40 focus:border-indigo-500
                              transition-colors">
            </div>
            <button type="submit"
                    class="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-white
                           bg-indigo-500 hover:bg-indigo-600 rounded-lg transition-colors
                           focus:outline-none focus:ring-2 focus:ring-indigo-500/40">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                Scan
            </button>
            <span id="scan-spinner" class="htmx-indicator text-sm text-gray-500 dark:text-gray-400 flex items-center gap-2">
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Scanning...
            </span>
        </form>
    </div>
</div>

<!-- Step 2: Repo list (loaded by HTMX) -->
<div id="repo-list"></div>

<!-- Step 3: Report (loaded by JS) -->
<div id="report-section"></div>

<!-- Toast container -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm"></div>

<script>
const BOT_PATTERNS = [/\[bot\]/i, /^dependabot/i, /^renovate/i, /^github-actions/i, /^bender-/i, /^aiphoria-ai$/i];
function isBot(name) {
    return BOT_PATTERNS.some(p => p.test(name));
}
function filterHumans(authors) {
    return authors.filter(a => !isBot(a));
}

function classifyFetchResult(raw) {
    // "Fetch OK; Pull OK" → success
    // "Fetch OK; Pull error: ..." → warning (fetch worked, pull failed — tags are fine)
    // "Fetch error: ..." → error
    const lower = raw.toLowerCase();
    const fetchOk = lower.includes('fetch ok');
    const hasError = lower.includes('error') || lower.includes('failed');
    if (fetchOk && !hasError) return 'success';
    if (fetchOk && hasError) return 'warning';
    return 'error';
}

function cleanGitMessage(raw) {
    // Extract human-readable part from stderr if present
    const stderrMatch = raw.match(/stderr:\s*'(.+?)'\s*$/s);
    if (stderrMatch) {
        const stderr = stderrMatch[1].replace(/^error:\s*/i, '').trim();
        const type = classifyFetchResult(raw);
        if (type === 'warning') return 'Fetched OK, pull skipped — ' + stderr;
        return stderr;
    }
    // Clean up "Pull error: Cmd('git')..." without stderr
    const pullErrMatch = raw.match(/Pull error:\s*(.+)/);
    if (pullErrMatch && raw.toLowerCase().includes('fetch ok')) {
        return 'Fetched OK, pull skipped';
    }
    return raw;
}

const toastStyles = {
    success: 'bg-emerald-50 dark:bg-emerald-500/10 border-emerald-200 dark:border-emerald-500/20 text-emerald-700 dark:text-emerald-300',
    warning: 'bg-amber-50 dark:bg-amber-500/10 border-amber-200 dark:border-amber-500/20 text-amber-700 dark:text-amber-300',
    error:   'bg-red-50 dark:bg-red-500/10 border-red-200 dark:border-red-500/20 text-red-700 dark:text-red-300',
};

function showToast(message, type) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `px-4 py-3 rounded-lg shadow-lg border text-sm animate-fadeIn ${toastStyles[type] || toastStyles.success}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, 4000);
    setTimeout(() => toast.remove(), 4300);
}

async function fetchRepo(name) {
    const rootDir = document.getElementById('root_dir').value;
    const btn = event.target.closest('button');
    btn.disabled = true;
    btn.innerHTML = `<svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>`;
    btn.classList.add('opacity-50');
    try {
        const resp = await fetch(`/api/repos/${name}/fetch`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `root_dir=${encodeURIComponent(rootDir)}`
        });
        const data = await resp.json();
        const raw = data.message || 'Done';
        const type = classifyFetchResult(raw);
        showToast(`${name}: ${cleanGitMessage(raw)}`, type);
        if (type === 'error') {
            btn.innerHTML = `<svg class="w-3.5 h-3.5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg> Error`;
        } else {
            btn.innerHTML = `<svg class="w-3.5 h-3.5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg> Done`;
        }
    } catch (e) {
        showToast(`${name}: ${e.message}`, 'error');
        btn.innerHTML = `<svg class="w-3.5 h-3.5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg> Error`;
    }
    setTimeout(() => {
        btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg> Fetch`;
        btn.disabled = false;
        btn.classList.remove('opacity-50');
    }, 2500);
}

async function fetchAll(btn) {
    const repos = document.querySelectorAll('.repo-cb');
    if (repos.length === 0) return;
    btn.disabled = true;
    const origHTML = btn.innerHTML;
    btn.innerHTML = `<svg class="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Fetching...`;
    const rootDir = document.getElementById('root_dir').value;
    const names = Array.from(repos).map(cb => cb.value);
    const results = await Promise.allSettled(names.map(async name => {
        const resp = await fetch(`/api/repos/${name}/fetch`, {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `root_dir=${encodeURIComponent(rootDir)}`
        });
        const data = await resp.json();
        return { name, message: data.message || 'Done' };
    }));
    let errors = 0;
    for (const r of results) {
        if (r.status === 'fulfilled') {
            const type = classifyFetchResult(r.value.message);
            if (type === 'error') errors++;
            showToast(`${r.value.name}: ${cleanGitMessage(r.value.message)}`, type);
        } else {
            errors++;
            showToast(`Fetch failed: ${r.reason}`, 'error');
        }
    }
    btn.innerHTML = origHTML;
    btn.disabled = false;
    if (errors === 0) showToast(`All ${names.length} repos fetched`, 'success');
    // Auto-load tags after fetch completes
    for (const name of names) {
        loadTags(name);
    }
}

async function loadTags(name) {
    const rootDir = document.getElementById('root_dir').value;
    const resp = await fetch(`/api/repos/${name}/tags?root_dir=${encodeURIComponent(rootDir)}`);
    const data = await resp.json();
    const tags = data.tags || [];

    const fromSel = document.getElementById(`from-${name}`);
    const toSel = document.getElementById(`to-${name}`);
    fromSel.innerHTML = '<option value="">-- from --</option>';
    toSel.innerHTML = '<option value="">-- to --</option>';

    tags.forEach(t => {
        const label = t.name + (t.is_release ? ' *' : '');
        fromSel.innerHTML += `<option value="${t.name}">${label}</option>`;
        toSel.innerHTML += `<option value="${t.name}">${label}</option>`;
    });

    // Auto-select: to = newest, from = second
    if (tags.length >= 2) {
        toSel.value = tags[0].name;
        fromSel.value = tags[1].name;
    } else if (tags.length === 1) {
        toSel.value = tags[0].name;
    }
}

async function collectCommits() {
    const rootDir = document.getElementById('root_dir').value;
    const rows = document.querySelectorAll('.repo-row');
    const selections = [];

    rows.forEach(row => {
        const cb = row.querySelector('input[type="checkbox"]');
        if (!cb.checked) return;
        const name = cb.value;
        const fromTag = document.getElementById(`from-${name}`).value;
        const toTag = document.getElementById(`to-${name}`).value;
        if (fromTag && toTag) {
            selections.push({repo_name: name, from_tag: fromTag, to_tag: toTag});
        }
    });

    if (selections.length === 0) {
        alert('Select at least one repo with both tags');
        return;
    }

    const btn = document.getElementById('collect-btn');
    btn.disabled = true;
    btn.innerHTML = `<svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Collecting...`;
    btn.classList.add('opacity-70');

    try {
        const resp = await fetch('/api/collect', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({root_dir: rootDir, selections})
        });
        const report = await resp.json();
        renderReport(report);
    } catch (e) {
        alert('Error collecting commits: ' + e.message);
    }

    btn.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg> Collect Commits`;
    btn.disabled = false;
    btn.classList.remove('opacity-70');
}

async function refreshReport() {
    const btn = event.target.closest('button');
    btn.disabled = true;
    btn.textContent = 'Checking...';
    try {
        const resp = await fetch('/api/refresh', {method: 'POST'});
        const report = await resp.json();
        if (report.error) {
            alert(report.error);
        } else {
            renderReport(report);
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
    btn.textContent = 'Check Changes';
    btn.disabled = false;
}

function toggleExportMenu() {
    document.getElementById('export-dropdown').classList.toggle('open');
}

// Close export dropdown on outside click
document.addEventListener('click', function(e) {
    const dd = document.getElementById('export-dropdown');
    if (dd && !dd.contains(e.target)) dd.classList.remove('open');
});

function renderReport(report) {
    const section = document.getElementById('report-section');
    let html = `
        <div class="mt-8">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">Report</h2>
                <div class="flex items-center gap-2">
                    <button onclick="refreshReport()"
                            class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg
                                   border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#1a1d26]
                                   text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#252830]
                                   transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.992 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182M2.985 19.644l3.181-3.183"/>
                        </svg>
                        Check Changes
                    </button>
                    <div id="export-dropdown" class="export-dropdown">
                        <button onclick="toggleExportMenu()"
                                class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg
                                       border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#1a1d26]
                                       text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-[#252830]
                                       transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
                            </svg>
                            Export
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                            </svg>
                        </button>
                        <div class="export-menu rounded-lg border border-gray-200 dark:border-gray-700
                                    bg-white dark:bg-[#1a1d26] shadow-lg py-1">
                            <a href="/api/export/csv"
                               class="block px-3 py-1.5 text-xs text-gray-700 dark:text-gray-300
                                      hover:bg-gray-50 dark:hover:bg-[#252830] transition-colors">
                                Export CSV
                            </a>
                            <a href="/api/export/markdown"
                               class="block px-3 py-1.5 text-xs text-gray-700 dark:text-gray-300
                                      hover:bg-gray-50 dark:hover:bg-[#252830] transition-colors">
                                Export Markdown
                            </a>
                            <a href="/api/export/json"
                               class="block px-3 py-1.5 text-xs text-gray-700 dark:text-gray-300
                                      hover:bg-gray-50 dark:hover:bg-[#252830] transition-colors">
                                Export JSON
                            </a>
                        </div>
                    </div>
                </div>
            </div>`;

    if (report.all_linear_keys && report.all_linear_keys.length > 0) {
        html += `<div class="flex flex-wrap items-center gap-2 px-4 py-3 mb-4 rounded-lg
                            bg-indigo-50 dark:bg-indigo-500/10 border border-indigo-100 dark:border-indigo-500/20">
            <span class="text-xs font-medium text-indigo-700 dark:text-indigo-300">
                All Linear Keys (${report.all_linear_keys.length}):
            </span>
            <div class="flex flex-wrap gap-1.5">
                ${report.all_linear_keys.map(k =>
                    `<span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full
                                 bg-violet-100 dark:bg-violet-500/20 text-violet-700 dark:text-violet-300">${k}</span>`
                ).join('')}
            </div>
        </div>`;
    }

    // Summary table: component → developers
    html += `<div class="mb-6 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1a1d26] overflow-hidden">
        <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
            <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Contributors by Component</h3>
        </div>
        <table class="w-full text-left">
            <thead>
                <tr class="border-b border-gray-100 dark:border-gray-800">
                    <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Component</th>
                    <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Version Range</th>
                    <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Developers</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
    for (const repo of report.repos) {
        const devs = filterHumans([...new Set(repo.commits.map(c => c.author))]);
        html += `<tr class="hover:bg-gray-50/50 dark:hover:bg-[#252830]/50">
            <td class="px-4 py-2 text-sm font-medium text-gray-900 dark:text-gray-100">${escapeHtml(repo.repo_name)}</td>
            <td class="px-4 py-2 text-xs text-gray-500 dark:text-gray-400">${escapeHtml(repo.from_tag)} &rarr; ${escapeHtml(repo.to_tag)}</td>
            <td class="px-4 py-2"><div class="flex flex-wrap gap-1.5">${devs.map(a =>
                `<span class="inline-flex items-center gap-1 px-2 py-0.5 text-[11px] font-medium rounded-full
                             bg-sky-100 dark:bg-sky-500/15 text-sky-700 dark:text-sky-300">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/>
                    </svg>${escapeHtml(a)}</span>`
            ).join('')}${devs.length === 0 ? '<span class="text-xs text-gray-400 dark:text-gray-500">bots only</span>' : ''}</div></td>
        </tr>`;
    }
    html += `</tbody></table></div>`;

    // Task → developers table
    if (report.all_linear_keys && report.all_linear_keys.length > 0) {
        const taskDevs = {};
        const taskRepos = {};
        for (const repo of report.repos) {
            for (const c of repo.commits) {
                const humans = filterHumans([c.author]);
                if (humans.length === 0) continue;
                for (const key of c.linear_keys) {
                    if (!taskDevs[key]) { taskDevs[key] = new Set(); taskRepos[key] = new Set(); }
                    humans.forEach(a => taskDevs[key].add(a));
                    taskRepos[key].add(repo.repo_name);
                }
            }
        }
        html += `<div class="mb-6 rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-[#1a1d26] overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-800">
                <h3 class="text-sm font-semibold text-gray-900 dark:text-gray-100">Task Owners</h3>
            </div>
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-gray-100 dark:border-gray-800">
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Task</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Components</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Developers</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
        for (const key of report.all_linear_keys) {
            const devs = taskDevs[key] ? [...taskDevs[key]] : [];
            const repos = taskRepos[key] ? [...taskRepos[key]] : [];
            html += `<tr class="hover:bg-gray-50/50 dark:hover:bg-[#252830]/50">
                <td class="px-4 py-2">
                    <span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full
                                 bg-violet-100 dark:bg-violet-500/20 text-violet-700 dark:text-violet-300">${key}</span>
                </td>
                <td class="px-4 py-2"><div class="flex flex-wrap gap-1">${repos.map(r =>
                    `<span class="text-xs text-gray-600 dark:text-gray-400">${escapeHtml(r)}</span>`
                ).join('<span class="text-gray-300 dark:text-gray-600">,</span> ')}</div></td>
                <td class="px-4 py-2"><div class="flex flex-wrap gap-1.5">${devs.map(a =>
                    `<span class="inline-flex items-center gap-1 px-2 py-0.5 text-[11px] font-medium rounded-full
                                 bg-sky-100 dark:bg-sky-500/15 text-sky-700 dark:text-sky-300">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/>
                        </svg>${escapeHtml(a)}</span>`
                ).join('')}</div></td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
    }

    for (const repo of report.repos) {
        const repoId = repo.repo_name.replace(/[^a-zA-Z0-9]/g, '-');
        const contributors = filterHumans([...new Set(repo.commits.map(c => c.author))]);
        html += `<div class="mb-4 rounded-xl border border-gray-200 dark:border-gray-800
                            bg-white dark:bg-[#1a1d26] overflow-hidden">
            <button onclick="this.nextElementSibling.classList.toggle('open'); this.querySelector('.chevron').classList.toggle('rotate-90')"
                    class="w-full flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-[#252830] transition-colors text-left">
                <div class="flex items-center gap-3">
                    <svg class="chevron w-4 h-4 text-gray-400 transition-transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
                    </svg>
                    <span class="text-sm font-semibold text-gray-900 dark:text-gray-100">${escapeHtml(repo.repo_name)}</span>
                    <span class="text-xs text-gray-500 dark:text-gray-400">
                        ${escapeHtml(repo.from_tag)} &rarr; ${escapeHtml(repo.to_tag)} &middot; ${repo.commits.length} commits
                    </span>
                </div>
                <div class="flex gap-1.5 flex-wrap items-center">
                    ${contributors.map(a =>
                        `<span class="inline-flex items-center gap-1 px-2 py-0.5 text-[11px] font-medium rounded-full
                                     bg-sky-100 dark:bg-sky-500/15 text-sky-700 dark:text-sky-300">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/>
                            </svg>
                            ${escapeHtml(a)}</span>`
                    ).join('')}
                    ${repo.linear_keys.map(k =>
                        `<span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full
                                     bg-violet-100 dark:bg-violet-500/20 text-violet-700 dark:text-violet-300">${k}</span>`
                    ).join('')}
                </div>
            </button>
            <div class="collapse-content open">`;

        if (repo.commits.length > 0) {
            html += `<table class="w-full text-left">
                <thead>
                    <tr class="border-t border-gray-100 dark:border-gray-800">
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Hash</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Author</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Date</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Message</th>
                        <th class="px-4 py-2 text-[11px] font-medium uppercase tracking-wider text-gray-500 dark:text-gray-400 bg-gray-50/50 dark:bg-[#0f1117]/50">Keys</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-800">`;
            for (const c of repo.commits) {
                const date = new Date(c.date).toLocaleDateString('en-CA');
                const msg = c.message.split('\n')[0];
                const keys = c.linear_keys.map(k =>
                    `<span class="inline-flex px-1.5 py-0.5 text-[11px] font-medium rounded-full
                                 bg-violet-100 dark:bg-violet-500/20 text-violet-700 dark:text-violet-300">${k}</span>`
                ).join(' ');
                html += `<tr class="hover:bg-gray-50/50 dark:hover:bg-[#252830]/50">
                    <td class="px-4 py-1.5 text-xs"><code class="text-indigo-600 dark:text-indigo-400 font-mono">${c.short_hash}</code></td>
                    <td class="px-4 py-1.5 text-xs text-gray-600 dark:text-gray-400">${escapeHtml(c.author)}</td>
                    <td class="px-4 py-1.5 text-xs text-gray-500 dark:text-gray-500 tabular-nums">${date}</td>
                    <td class="px-4 py-1.5 text-xs font-mono text-gray-700 dark:text-gray-300 max-w-md truncate">${escapeHtml(msg)}</td>
                    <td class="px-4 py-1.5"><div class="flex gap-1 flex-wrap">${keys}</div></td>
                </tr>`;
            }
            html += `</tbody></table>`;
        } else {
            html += `<p class="px-4 py-6 text-center text-sm text-gray-400 dark:text-gray-500">No commits in this range</p>`;
        }
        html += `</div></div>`;
    }

    html += `</div>`;
    section.innerHTML = html;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleAll(source) {
    document.querySelectorAll('.repo-cb').forEach(cb => cb.checked = source.checked);
}
</script>
{% endblock %}
